<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ShelterA</title>
        <link rel="stylesheet" href="../../static/css/output.css">
    </head>
    <body>
        <header class = 'flex h-20 items-center bg-blue-300'>
            <div class="basis-2/3 text-3xl margin-left ml-2">
                Shelter A
            </div>
            <div class="basis-1/3 flex items-center justify-end gap-5 mr-3">
                <a>Meet Our Dogs</a>
                <a>Adopt</a>
                <button class="bg-pink-500 hover:bg-pink-700 text-white font-bold py-2 px-4 rounded">Donate</button>
            </div>
        </header>
        <!--  Convertor to lb/kg  -->
        <h1>{{ dog.name }}</h1>
        <ul>
            <li>{{ dog.age_year }} year(s) {{ dog.age_month }} month(s)</li>
             <li>Breed: {{ dog.breed }}</li>
            <li>Weight: {{ dog.weight }} kg</li>
            <li>Status: {{ dog.status }}</li>
        </ul>
        
        <footer>
            <div class='flex h-30 bg-pink-200 text-center'>Copyright Shinon &copy; 2026</div>
        </footer>
    </body>

</html>
