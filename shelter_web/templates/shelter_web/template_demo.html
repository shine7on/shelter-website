<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ShelterA</title>
        <link rel="stylesheet" href="../../static/css/output.css">
    </head>
    <body>
        <header class = 'flex h-20 items-center bg-blue-300'>
            <div class="basis-2/3 text-3xl margin-left ml-2">
                Shelter A
            </div>
            <div class="basis-1/3 flex items-center justify-end gap-5 mr-3">
                <a>Meet Our Dogs</a>
                <a>Adopt</a>
                <button class="bg-pink-500 hover:bg-pink-700 text-white font-bold py-2 px-4 rounded">Donate</button>
            </div>
        </header>
        <!-- Add filter / Convertor to lb/kg / -->
        <input type="text" id="filter-search" placeholder="Search By Name"/>
        <select id="filter-sex">
            <option value="">All</option>
            <option value="Female">Female</option>
            <option value="Male">Male</option>
        </select>
        <select id="filter-status">
            <option value="">All</option>
            <option value="Adopted">Adopted</option>
            <option value="Pending">Pending</option>
            <option value="Not-Adopted">Not-Adopted</option>
        </select>
        <select id="filter-breed">
            <option value="">All</option>
            {% for breed in breeds %}
            <option value=`{{ breed.id }}`>{{breed}}</option>
            {% endfor %}
        </select>
        <ul id="dog-list">
            {% for dog in dogs %}
            <li><b>{{dog.id}} : {{dog.name}}, {{dog.age_year}}, {{dog.weight}}, {{dog.sex}}, {{dog.status}}</b></li>
            {% endfor %}
        </ul>
        
        <footer>
            <div class='flex h-30 bg-pink-200 text-center'>Copyright Shinon &copy; 2026</div>
        </footer>

        <script>
            const searchbar = document.getElementById('filter-search')
            const listitems = document.getElementById('dog-list')

            const filter_sex = document.getElementById('filter-sex')
            const filter_status = document.getElementById('filter-status')
            const filter_breed = document.getElementById('filter-breed')

            searchbar.addEventListener('input', fetchDogs);

            filter_sex.addEventListener('change', fetchDogs);
            filter_status.addEventListener('change', fetchDogs);
            filter_breed.addEventListener('change', fetchDogs);

            function fetchDogs() {
                const params = new URLSearchParams({
                    search: searchbar.value,
                    sex:    filter_sex.value,
                    status: filter_status.value,
                    breed:  filter_breed.value,
                })

                fetch(`/dogapi?${params}`)
                    .then(res => res.json())
                    .then(data => {
                        console.log(data)
                    })
            }
        </script>
    </body>

</html>
