<!DOCTYPE html>
<html lang="en">
    {% load static %}
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ShelterA</title>
        <link rel="stylesheet" href="../../static/css/output.css">
    </head>
    <body>
        <header class = 'flex h-20 items-center bg-blue-300'>
            <div class="basis-2/3 text-3xl margin-left ml-2">
                Shelter A
            </div>
            <div class="basis-1/3 flex items-center justify-end gap-5 mr-3">
                <a>Meet Our Dogs</a>
                <a>Adopt</a>
                <button class="bg-pink-500 hover:bg-pink-700 text-white font-bold py-2 px-4 rounded">Donate</button>
            </div>
        </header>
        <!-- Add filter / Convertor to lb/kg / -->
        <input type="text" id="filter-search" placeholder="Search By Name"/>
        <select id="filter-sex">
            <option value="">All</option>
            <option value="Female">Female</option>
            <option value="Male">Male</option>
        </select>
        <select id="filter-status">
            <option value="">All</option>
            <option value="Adopted">Adopted</option>
            <option value="Pending">Pending</option>
            <option value="Not-Adopted">Not-Adopted</option>
        </select>
        <select id="filter-breed">
            <option value="">All</option>
            {% for breed in breeds %}
            <option value=`{{ breed.id }}`>{{breed}}</option>
            {% endfor %}
        </select>

        <div id="dog-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 p-6">
            {% for dog in dogs %}
            <div class="rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                {% if dog.photo %}
                <img src="{{ dog.photo.url }}" class="w-full h-48 object-cover">
                {% else %}
                <img src="{% static 'images/default.png' %}" class="w-full h-48 object-cover">
                {% endif %}
                <div class="p-3">
                    <a href="{% url 'dog_detail' dog.id %}" class="font-medium text-base">{{dog.name}}</a>
                    <p class="text-sm text-gray-500 mt-1">{{dog.breed}} · {{dog.age_year}}y {{dog.age_month}}m · {{dog.weight}}kg · {{dog.sex}}</p>
                    <span class="text-xs px-2 py-1 rounded-full mt-2 inline-block
                        {% if dog.status == 'Not-Adopted' %}bg-green-100 text-green-800
                        {% elif dog.status == 'Pending' %}bg-yellow-100 text-yellow-800
                        {% else %}bg-gray-100 text-gray-500{% endif %}">
                        {{dog.status}}
                    </span>
                </div>
            </div>
            {% endfor %}
        </div>
        
        <footer>
            <div class='flex h-30 bg-pink-200 text-center'>Copyright Shinon &copy; 2026</div>
        </footer>

        <script>
            const searchbar = document.getElementById('filter-search')
            const listitems = document.getElementById('dog-list')

            const filter_sex = document.getElementById('filter-sex')
            const filter_status = document.getElementById('filter-status')
            const filter_breed = document.getElementById('filter-breed')

            searchbar.addEventListener('input', fetchDogs);

            filter_sex.addEventListener('change', fetchDogs);
            filter_status.addEventListener('change', fetchDogs);
            filter_breed.addEventListener('change', fetchDogs);

            function fetchDogs() {
                const params = new URLSearchParams({
                    search: searchbar.value,
                    sex:    filter_sex.value,
                    status: filter_status.value,
                    breed:  filter_breed.value,
                })

                fetch(`/dogapi?${params}`)
                    .then(res => res.json())
                    .then(data => {
                        listitems.innerHTML = data.map(dog => {
                            const photoHtml = dog.photo
                                ? `<img src="/media/${dog.photo}" class="w-full h-48 object-cover">`
                                : `<img src="/static/images/default.png" class="w-full h-48 object-cover">`

                            const statusHtml = dog.status === 'Not-Adopted'
                                ? 'bg-green-100 text-green-800'
                                : dog.status === 'Pending'
                                ? 'bg-yellow-100 text-yellow-800'
                                : 'bg-gray-100 text-gray-500'
                        
                            return `<div class="rounded-xl border border-gray-200 shadow-sm overflow-hidden">${photoHtml}
                                    <a href='/dog/${dog.id}/' class="font-medium text-base">${dog.name}</a>
                                    <div class="p-3">
                                        <p class="text-sm text-gray-500 mt-1">${dog.breed} ·${dog.age_year}y ${dog.age_month}m · ${dog.weight}kg · ${dog.sex}</p>
                                        <span class='text-xs px-2 py-1 rounded-full mt-2 inline-block ${statusHtml}'>${dog.status}</span>
                                    </div>
                                    </div>`
                    }).join('')
                })
            }
        </script>
    </body>

</html>
