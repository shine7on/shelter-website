{% extends "base.html" %}
{% load static %}
{% block title %}All Dogs{% endblock %}

{% block content %}
<div class="flex flex-col mx-auto mt-3 max-w-md p-8 bg-white border border-red-200 rounded-2xl">
  <h2 class="text-lg font-medium text-gray-900 mb-6">Adoption Form</h2>

  <!-- First & Last Name -->
  <div class="grid grid-cols-2 gap-4 mt-5">
    <div class="relative mb-6 px-3">
      <input type="text" id="fname" placeholder="First Name"
        class="block w-full py-2.5 text-sm text-gray-900 bg-transparent border-0 border-b border-gray-300 focus:border-violet-500 focus:outline-none focus:ring-0" />
    </div>
    <div class="relative px-3">
      <input type="text" id="lname" placeholder="Last Name"
        class="block w-full py-2.5 text-sm text-gray-900 bg-transparent border-0 border-b border-gray-300 focus:border-violet-500 focus:outline-none focus:ring-0" />
    </div>
    <div class="relative px-3">
        <input type="email" id="email" placeholder="Email"
        class="block w-full py-2.5 text-sm text-gray-900 bg-transparent border-0 border-b border-gray-300 focus:border-violet-500 focus:outline-none focus:ring-0" />
    </div>
    <div class="relative mb-6 px-3">
        <input type="tel" id="phone" placeholder="Phone Number"
        class="block w-full py-2.5 text-sm text-gray-900 bg-transparent border-0 border-b border-gray-300 focus:border-violet-500 focus:outline-none focus:ring-0" />
    </div>
    <div class="relative mb-6 px-3">
    <input type="text" id="street" placeholder="Street"
      class="block w-full py-2.5 text-sm text-gray-900 bg-transparent border-0 border-b border-gray-300 focus:border-violet-500 focus:outline-none focus:ring-0" />
    </div>
    <div class="relative mb-6 px-3">
        <input type="text" id="city" placeholder="City"
        class="block w-full py-2.5 text-sm text-gray-900 bg-transparent border-0 border-b border-gray-300 focus:border-violet-500 focus:outline-none focus:ring-0" />
    </div>
    <div class="relative mb-6 px-3">
    <input type="text" id="street" placeholder="State"
      class="block w-full py-2.5 text-sm text-gray-900 bg-transparent border-0 border-b border-gray-300 focus:border-violet-500 focus:outline-none focus:ring-0" />
    </div>
    <div class="relative mb-6 px-3">
    <input type="text" id="housing" placeholder="Housing"
      class="block w-full py-2.5 text-sm text-gray-900 bg-transparent border-0 border-b border-gray-300 focus:border-violet-500 focus:outline-none focus:ring-0" />
    </div>
  </div>

  <!-- Submit -->
  <div class="px-3 mt-5">
    <button type="submit" class="bg-teal-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-teal-700">
      Submit
    </button>
  </div>
</div>
{% endblock %}
